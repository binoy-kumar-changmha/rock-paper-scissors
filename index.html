<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buiding Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="https://atlas-content-cdn.pixelsquid.com/stock-images/rock-stone-AvXzl49-600.jpg" alt="rock"
                width="200" height="200">
        </div>
        <div class="choice" id="paper"><img
                src="https://static.vecteezy.com/system/resources/previews/011/643/706/non_2x/business-newspaper-isolated-on-white-background-daily-newspaper-mock-up-concept-photo.jpg"
                alt="paper" width="200" height="200">
        </div>
        <div class="choice" id="scissor">
            <img src="https://m.media-amazon.com/images/I/31eJJdTEitL.jpg" alt="Scissors" width="200" height="200">
        </div>
    </div>
    <div class="result">
        <div>
            <p id="score">0</p>
            <p>You</p>
        </div>
        <div>
            <p id="comScore">0</p>
            <p>Robot</p>
        </div>
    </div>
    <div class="msgContainer">
        <p id="msg">Make your move</p>
    </div>
    <script src="script.js">
    </script>
</body>

</html>
